<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo App</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f1a; color: #e0e0e0; min-height: 100vh; display: flex; justify-content: center; padding: 2rem; }
    .container { max-width: 520px; width: 100%; }
    h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 1.5rem; color: #fff; text-align: center; }
    .add-form { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
    .add-form input { flex: 1; padding: 0.7rem 1rem; border: 1px solid #2a2a3e; border-radius: 8px; background: #1a1a2e; color: #fff; font-size: 0.95rem; outline: none; transition: border-color 0.2s; }
    .add-form input:focus { border-color: #6c63ff; }
    .add-form button { padding: 0.7rem 1.4rem; border: none; border-radius: 8px; background: #6c63ff; color: #fff; font-weight: 600; cursor: pointer; transition: background 0.2s; }
    .add-form button:hover { background: #5a52e0; }
    .todo-list { list-style: none; }
    .todo-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 1rem; background: #1a1a2e; border-radius: 8px; margin-bottom: 0.5rem; transition: background 0.2s; }
    .todo-item:hover { background: #22223a; }
    .todo-item .checkbox { width: 1.2rem; height: 1.2rem; accent-color: #6c63ff; cursor: pointer; }
    .todo-item .text { flex: 1; font-size: 0.95rem; }
    .todo-item .text.done { text-decoration: line-through; color: #666; }
    .todo-item .delete { background: none; border: none; color: #ff4757; cursor: pointer; font-size: 1.1rem; padding: 0.2rem; opacity: 0.6; transition: opacity 0.2s; }
    .todo-item .delete:hover { opacity: 1; }
    .empty { text-align: center; color: #666; padding: 2rem; }
    .status-bar { text-align: center; margin-top: 1.5rem; font-size: 0.85rem; color: #555; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📋 Todo</h1>
    <div class="add-form">
      <input id="newTodo" placeholder="Add a new todo..." autofocus>
      <button onclick="addTodo()">Add</button>
    </div>
    <ul class="todo-list" id="todoList"></ul>
    <div class="status-bar" id="statusBar"></div>
  </div>
  <script>
    const list = document.getElementById('todoList');
    const input = document.getElementById('newTodo');
    const status = document.getElementById('statusBar');

    async function loadTodos() {
      const res = await fetch('/api/todos');
      const todos = await res.json();
      renderTodos(todos);
    }

    function renderTodos(todos) {
      list.innerHTML = todos.length === 0
        ? '<li class="empty">Nothing yet — add your first todo ✨</li>'
        : todos.map(t => `
          <li class="todo-item">
            <input type="checkbox" class="checkbox" ${t.done ? 'checked' : ''} onchange="toggleTodo(${t.id}, this.checked)">
            <span class="text ${t.done ? 'done' : ''}">${escapeHtml(t.text)}</span>
            <button class="delete" onclick="deleteTodo(${t.id})">✕</button>
          </li>
        `).join('');
      status.textContent = todos.length > 0 ? `${todos.filter(t => !t.done).length} left of ${todos.length}` : '';
    }

    function escapeHtml(s) {
      const div = document.createElement('div');
      div.textContent = s;
      return div.innerHTML;
    }

    async function addTodo() {
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      await fetch('/api/todos', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({text}) });
      await loadTodos();
    }

    async function toggleTodo(id, done) {
      await fetch('/api/todos/' + id, { method: 'PUT', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({done}) });
      await loadTodos();
    }

    async function deleteTodo(id) {
      await fetch('/api/todos/' + id, { method: 'DELETE' });
      await loadTodos();
    }

    input.addEventListener('keydown', e => e.key === 'Enter' && addTodo());
    loadTodos();
  </script>
</body>
</html>
